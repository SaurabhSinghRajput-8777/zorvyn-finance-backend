spring:
  application:
    name: finance-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/finance_db
    username: postgres
    password: [PASSWORD]
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

server:
  port: 8080

jwt:
  # Override in production via JWT_SECRET environment variable
  secret: Wm9ydnluRmluYW5jZUVudGVycHJpc2VKV1RTZWNyZXRLZXkyMDI0U2VjdXJlVG9rZW4xMjM0NTY=
  expiration: 86400000 # 24 hours in milliseconds

logging:
  level:
    com.saurabh.finance: DEBUG
    org.springframework.security: INFO
